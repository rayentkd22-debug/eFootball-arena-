<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Arena Pro | منصة الأبطال</title>
    <!-- المكتبات الخارجية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0e1a; --bg2: #111827; --card: #151d2e; --card2: #1a2338;
            --yellow: #f5c518; --green: #22c55e; --blue: #3b82f6; --purple: #7c3aed;
            --red: #ef4444; --orange: #f97316; --text: #e2e8f0; --muted: #64748b;
            --border: #1e2d45; --gold: #c9a84c; --wa: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Loading Screen */
        #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .load-ball { font-size: 50px; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* Layout */
        header { background: var(--bg2); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); sticky: top; z-index: 100; }
        .logo { font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; }
        .logo span { color: var(--yellow); }
        
        .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 12px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Cairo'; }
        .tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

        main { padding: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & UI */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn-primary { background: var(--yellow); color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; font-family: 'Cairo'; }
        .btn-wa { background: var(--wa); color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Stats & Profile */
        .profile-header { text-align: center; padding: 20px 0; }
        .avatar-lg { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--yellow); margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: var(--card2); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 20px; font-weight: 900; display: block; }

        /* Auth */
        #auth-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }
        .input-field { background: var(--card2); border: 1px solid var(--border); padding: 12px; border-radius: 10px; width: 100%; color: #fff; margin-bottom: 15px; font-family: 'Cairo'; }

        /* Admin V2 Spy */
        .spy-msg { font-size: 11px; padding: 8px; border-bottom: 1px solid #222; }
        .spy-name { color: var(--yellow); font-weight: bold; }

        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 8px; z-index: 10000; display: none; font-size: 13px; }
        .toast.error { background: var(--red); }

        /* Modals */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg2); border: 1px solid var(--border); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
        
        .clickable-player { cursor: pointer; color: var(--yellow); font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="loading-screen">
        <div class="load-ball">⚽</div>
        <p style="margin-top:15px; color:var(--muted)">جاري دخول الملعب...</p>
    </div>

    <!-- واجهة الدخول -->
    <div id="auth-screen" style="display:none;">
        <div class="auth-box">
            <h2 style="text-align:center; margin-bottom:20px;">eFootball Arena</h2>
            <div id="auth-forms">
                <input type="email" id="auth-email" class="input-field" placeholder="البريد الإلكتروني">
                <input type="password" id="auth-password" class="input-field" placeholder="كلمة المرور">
                <button class="btn-primary" onclick="handleAuth()">دخول / تسجيل</button>
                <p style="font-size:11px; color:var(--muted); text-align:center; margin-top:15px;">سيتم إنشاء حساب تلقائياً إذا كنت جديداً</p>
            </div>
        </div>
    </div>

    <!-- واجهة التطبيق الرئيسية -->
    <div id="app-screen" style="display:none;">
        <header>
            <div class="logo" onclick="showTab('home')">e<span>Football</span> Arena</div>
            <div id="header-user" style="display:flex; align-items:center; gap:10px;">
                <span id="user-pts" style="color:var(--yellow); font-weight:bold; font-size:13px;">0 pts</span>
                <div id="user-avatar-top" onclick="showTab('profile')" style="width:35px; height:35px; border-radius:50%; background:var(--yellow); cursor:pointer; overflow:hidden;"></div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab('home')">الرئيسية</button>
            <button class="tab" onclick="showTab('tournaments')">البطولات</button>
            <button class="tab" onclick="showTab('ranking')">الترتيب</button>
            <button class="tab" onclick="showTab('profile')">حسابي</button>
            <button id="admin-tab" class="tab" style="display:none;" onclick="showTab('admin')">التحكم</button>
        </div>

        <main id="main-content">
            <!-- قسم الرئيسية -->
            <div id="sec-home" class="section active">
                <div class="card" style="background:linear-gradient(135deg, #1e293b, #0f172a); border:none;">
                    <h3>مرحباً بك يا كابتن ⚽</h3>
                    <p style="font-size:13px; color:var(--muted); margin-top:5px;">سجل في البطولات واربح النقاط لتصدر الترتيب العالمي.</p>
                </div>
                <div id="active-tournaments-brief"></div>
            </div>

            <!-- قسم البطولات -->
            <div id="sec-tournaments" class="section">
                <h4 style="margin-bottom:15px;">البطولات المتاحة 🏆</h4>
                <div id="tournaments-list">تحميل...</div>
            </div>

            <!-- قسم الترتيب -->
            <div id="sec-ranking" class="section">
                <h4 style="margin-bottom:15px;">أفضل اللاعبين 🏅</h4>
                <div id="ranking-list"></div>
            </div>

            <!-- قسم البروفايل -->
            <div id="sec-profile" class="section">
                <div id="my-profile-data"></div>
                <button class="btn-primary" style="background:var(--card2); color:#fff; margin-top:10px;" onclick="openEditProfile()">تعديل البيانات</button>
                <button class="btn-primary" style="background:var(--red); color:#fff; margin-top:10px;" onclick="logout()">تسجيل الخروج</button>
            </div>

            <!-- قسم الأدمن -->
            <div id="sec-admin" class="section">
                <div class="card">
                    <h5 style="color:var(--yellow)">👑 لوحة الأدمن</h5>
                    <button class="btn-primary" style="margin-top:10px; background:var(--purple); color:#fff;" onclick="openAdminV2()">Admin V2 (مراقبة الرسائل 🕵️)</button>
                    <hr style="margin:15px 0; border:0; border-top:1px solid var(--border);">
                    <h6>إضافة بطولة جديدة:</h6>
                    <input type="text" id="new-t-name" class="input-field" placeholder="اسم البطولة">
                    <input type="number" id="new-t-max" class="input-field" placeholder="أقصى عدد لاعبين (مثلاً 16)">
                    <button class="btn-primary" onclick="createTournament()">إضافة البطولة</button>
                </div>
                <div id="admin-reports"></div>
            </div>

            <!-- قسم عرض بروفايل خارجي -->
            <div id="sec-view-profile" class="section">
                <button onclick="showTab('ranking')" style="background:none; border:none; color:var(--yellow); margin-bottom:10px; cursor:pointer;">🔙 عودة للترتيب</button>
                <div id="external-profile-content"></div>
            </div>
        </main>
    </div>

    <!-- المودال الموحد -->
    <div id="modal">
        <div class="modal-content">
            <h4 id="modal-title" style="margin-bottom:15px;"></h4>
            <div id="modal-body"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="modal-cancel" class="btn-primary" style="background:var(--card2); color:#fff;" onclick="closeModal()">إلغاء</button>
                <button id="modal-confirm" class="btn-primary">تأكيد</button>
            </div>
        </div>
    </div>

    <script>
        // تكوين Supabase
        const SUPABASE_URL = 'https://hiqxyslhkjxqotjkfirr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_brBzpO6J8NdAv-zsWgV1Rw_s9BdC58Q'; 
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let myProfile = null;

        // 1. إدارة الدخول
        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                await setupUser(session.user);
            } else {
                showAuth();
            }

            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) await setupUser(session.user);
                if (event === 'SIGNED_OUT') showAuth();
            });
        }

        async function setupUser(user) {
            currentUser = user;
            const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
            
            if (!profile) {
                // إنشاء بروفايل جديد إذا لم يوجد
                const { data: newProfile } = await sb.from('profiles').insert({
                    id: user.id,
                    username: user.email.split('@')[0],
                    points: 0,
                    email: user.email
                }).select().single();
                myProfile = newProfile;
            } else {
                myProfile = profile;
            }

            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';

            if (myProfile.is_admin) document.getElementById('admin-tab').style.display = 'block';
            
            updateUI();
            loadTournaments();
            loadRanking();
        }

        function showAuth() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if (!email || !password) return alert('أدخل البيانات');

            // محاولة دخول
            const { error: loginErr } = await sb.auth.signInWithPassword({ email, password });
            if (loginErr) {
                // محاولة تسجيل إذا لم يوجد الحساب
                const { error: regErr } = await sb.auth.signUp({ email, password });
                if (regErr) alert(regErr.message);
                else alert('تم إنشاء الحساب! تحقق من إيميلك أو حاول الدخول');
            }
        }

        async function logout() { await sb.auth.signOut(); }

        // 2. إدارة الواجهة
        function showTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('sec-' + tabId).classList.add('active');
            // تحديد الـ Tab النشط
            const btnIdx = {home:0, tournaments:1, ranking:2, profile:3, admin:4}[tabId];
            if (btnIdx !== undefined) document.querySelectorAll('.tab')[btnIdx].classList.add('active');
        }

        function updateUI() {
            document.getElementById('user-pts').innerText = `${myProfile.points || 0} pts`;
            const avatarDiv = document.getElementById('user-avatar-top');
            if (myProfile.avatar_url) {
                avatarDiv.innerHTML = `<img src="${myProfile.avatar_url}" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                avatarDiv.innerText = myProfile.username[0].toUpperCase();
                avatarDiv.style.display = 'flex'; avatarDiv.style.alignItems = 'center'; avatarDiv.style.justifyContent = 'center';
            }
            renderMyProfile();
        }

        // 3. إدارة البطولات
        async function loadTournaments() {
            const { data: list } = await sb.from('tournaments').select('*').order('created_at', {ascending:false});
            const container = document.getElementById('tournaments-list');
            if (!list || list.length === 0) { container.innerHTML = "لا توجد بطولات حالياً"; return; }

            container.innerHTML = list.map(t => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${t.name}</strong>
                        <span style="font-size:11px; color:var(--muted)">${t.current_players}/${t.max_players} لاعب</span>
                    </div>
                    <button class="btn-primary" style="margin-top:10px; font-size:12px;" onclick="tryJoin('${t.id}')">تسجيل في البطولة</button>
                </div>
            `).join('');
        }

        // منع تكرار التسجيل والتحقق من الواتساب
        async function tryJoin(tId) {
            // 1. هل اللاعب مسجل أصلاً؟
            const { data: participant } = await sb.from('tournament_participants')
                .select('*').eq('tournament_id', tId).eq('profile_id', currentUser.id);
            
            if (participant && participant.length > 0) {
                return showToast('⚠️ أنت مسجل بالفعل في هذه البطولة!', true);
            }

            // 2. هل لديه واتساب؟
            if (!myProfile.whatsapp) {
                openWhatsAppModal(tId);
            } else {
                confirmJoin(tId);
            }
        }

        function openWhatsAppModal(tId) {
            const title = "رقم الواتساب مطلوب 📱";
            const body = `
                <div style="text-align:center">
                    <p style="font-size:13px; margin-bottom:15px;">لتتمكن من المشاركة، يجب إضافة رقمك ليتواصل معك الأدمن والخصوم.</p>
                    <input type="tel" id="modal-wa-input" class="input-field" placeholder="مثلاً: 21650123456" style="text-align:center">
                </div>
            `;
            openModal(title, body, async () => {
                const val = document.getElementById('modal-wa-input').value;
                if (val.length < 8) return showToast('الرقم قصير جداً', true);
                
                const { error } = await sb.from('profiles').update({ whatsapp: val }).eq('id', currentUser.id);
                if (!error) {
                    myProfile.whatsapp = val;
                    closeModal();
                    confirmJoin(tId);
                }
            });
        }

        async function confirmJoin(tId) {
            const { data: tourney } = await sb.from('tournaments').select('*').eq('id', tId).single();
            if (tourney.current_players >= tourney.max_players) return showToast('البطولة ممتلئة', true);

            const { error } = await sb.from('tournament_participants').insert({
                tournament_id: tId, profile_id: currentUser.id
            });

            if (!error) {
                await sb.from('tournaments').update({ current_players: tourney.current_players + 1 }).eq('id', tId);
                showToast('✅ تم تسجيلك في البطولة!');
                loadTournaments();
            }
        }

        // 4. إدارة الترتيب والبروفايلات
        async function loadRanking() {
            const { data: users } = await sb.from('profiles').select('*').order('points', {ascending:false}).limit(20);
            const container = document.getElementById('ranking-list');
            
            container.innerHTML = users.map((u, index) => `
                <div class="card" style="display:flex; align-items:center; gap:12px; padding:10px;">
                    <span style="font-weight:900; color:var(--muted)">#${index+1}</span>
                    <img src="${u.avatar_url || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <div style="flex:1">
                        <div class="clickable-player" onclick="viewPlayer('${u.id}')">${u.username}</div>
                        <div style="font-size:10px; color:var(--muted)">${u.points} نقطة</div>
                    </div>
                </div>
            `).join('');
        }

        async function viewPlayer(userId) {
            showTab('view-profile');
            const container = document.getElementById('external-profile-content');
            container.innerHTML = "جاري التحميل...";

            const { data: p } = await sb.from('profiles').select('*').eq('id', userId).single();
            if (p) {
                container.innerHTML = `
                    <div class="profile-header">
                        <img src="${p.avatar_url || 'https://via.placeholder.com/90'}" class="avatar-lg">
                        <h4>${p.username}</h4>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-val">${p.points}</span><span style="font-size:10px">نقطة</span></div>
                            <div class="stat-box"><span class="stat-val" style="color:var(--green)">${p.wins || 0}</span><span style="font-size:10px">فوز</span></div>
                        </div>
                        ${p.whatsapp ? `<button class="btn-wa" onclick="window.open('https://wa.me/${p.whatsapp}')">📱 مراسلة واتساب</button>` : ''}
                    </div>
                `;
            }
        }

        function renderMyProfile() {
            const container = document.getElementById('my-profile-data');
            container.innerHTML = `
                <div class="profile-header">
                    <img src="${myProfile.avatar_url || 'https://via.placeholder.com/90'}" class="avatar-lg">
                    <h4>${myProfile.username}</h4>
                    <p style="font-size:12px; color:var(--muted)">${myProfile.email}</p>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-val">${myProfile.points}</span><span style="font-size:10px">نقطة</span></div>
                        <div class="stat-box"><span class="stat-val" style="color:var(--green)">${myProfile.wins || 0}</span><span style="font-size:10px">فوز</span></div>
                    </div>
                </div>
            `;
        }

        function openEditProfile() {
            openModal("تعديل البروفايل ✏️", `
                <label style="font-size:12px">اسم المستخدم</label>
                <input id="edit-username" class="input-field" value="${myProfile.username}">
                <label style="font-size:12px">رابط صورة البروفايل</label>
                <input id="edit-avatar" class="input-field" value="${myProfile.avatar_url || ''}" placeholder="https://image.url">
            `, async () => {
                const username = document.getElementById('edit-username').value;
                const avatar = document.getElementById('edit-avatar').value;
                const { error } = await sb.from('profiles').update({ username, avatar_url: avatar }).eq('id', currentUser.id);
                if (!error) {
                    location.reload();
                }
            });
        }

        // 5. وظائف الأدمن
        async function createTournament() {
            const name = document.getElementById('new-t-name').value;
            const max = document.getElementById('new-t-max').value;
            if (!name || !max) return alert('أكمل البيانات');

            const { error } = await sb.from('tournaments').insert({ name, max_players: max, current_players: 0 });
            if (!error) {
                alert('تمت الإضافة!');
                loadTournaments();
            }
        }

        // Admin V2 - مراقبة الرسائل
        async function openAdminV2() {
            const { data: msgs } = await sb.from('messages')
                .select('*, sender:sender_id(username), receiver:receiver_id(username)')
                .order('created_at', {ascending:false})
                .limit(50);
            
            const html = msgs.map(m => `
                <div class="spy-msg">
                    <span class="spy-name">${m.sender?.username}</span> ⬅️ <span class="spy-name">${m.receiver?.username}</span>: 
                    <span>${m.content}</span>
                </div>
            `).join('');

            openModal("Spy Mode - آخر 50 رسالة 🕵️", `<div style="max-height:300px; overflow-y:auto;">${html || 'لا رسائل'}</div>`, null);
        }

        // 6. الأدوات المساعدة (Modals & Toast)
        function openModal(title, body, confirmAction) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            const confirmBtn = document.getElementById('modal-confirm');
            if (confirmAction) {
                confirmBtn.style.display = 'block';
                confirmBtn.onclick = confirmAction;
            } else {
                confirmBtn.style.display = 'none';
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = isError ? 'toast error' : 'toast';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // تشغيل التطبيق
        window.onload = init;
    </script>
</body>
</html>
